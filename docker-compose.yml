services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Lafite_Secret1!}
      MSSQL_PID: ${MSSQL_PID:-Developer}
    ports:
      - '${MSSQL_PORT:-1433}:1433'
    volumes:
      - mssql_data:/var/opt/mssql
      - ./docker/mssql/init:/usr/config/init:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" -b -o /dev/null || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - '${API_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: '${DATABASE_URL:-Server=db,1433;Database=lafite_tracker;User Id=sa;Password=Lafite_Secret1!;Encrypt=true;TrustServerCertificate=true}'
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-5173}:80'
    depends_on:
      - api

volumes:
  mssql_data:
