x-dev-volumes: &dev-volumes
  - .:/app:cached
  - dev_node_modules:/app/node_modules
  - dev_api_node_modules:/app/apps/api/node_modules
  - dev_web_node_modules:/app/apps/web/node_modules

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Lafite_Secret1!}
      MSSQL_PID: ${MSSQL_PID:-Developer}
    ports:
      - '${MSSQL_PORT:-1433}:1433'
    volumes:
      - mssql_dev_data:/var/opt/mssql
    healthcheck:
      test:
        [
          'CMD-SHELL',
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" -b -o /dev/null || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Lafite_Secret1!}
      MSSQL_HOST: db
    volumes:
      - ./docker/mssql/init:/init:ro
      - ./docker/mssql/run-init.sh:/run-init.sh:ro
    entrypoint: ['/bin/bash', '/run-init.sh']
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    ports:
      - '${API_PORT:-3000}:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: '${DATABASE_URL:-sqlserver://db:1433;database=lafite_tracker;user=sa;password=Lafite_Secret1!;encrypt=true;trustServerCertificate=true}'
    volumes: *dev-volumes
    depends_on:
      db-init:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    ports:
      - '${WEB_PORT:-5173}:5173'
    environment:
      NODE_ENV: development
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    volumes: *dev-volumes
    depends_on:
      - api

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:lts
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - 9443:9443
      - 8000:8000

volumes:
  mssql_dev_data:
  dev_node_modules:
  dev_api_node_modules:
  dev_web_node_modules:
  portainer_data:
    name: portainer_data

networks:
  default:
    name: portainer_network
